<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="12">
  <text x="450" y="20" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">AV1 Superframe Batching in AssembleBitstreamData</text>

  <!-- Encode order linked list -->
  <text x="10" y="55" fill="#555" font-size="11">Encode</text>
  <text x="10" y="67" fill="#555" font-size="11">Order</text>

  <rect x="80"  y="42" width="85" height="35" rx="4" fill="#e67e22"/>
  <text x="122" y="58" text-anchor="middle" fill="white" font-size="9" font-weight="bold">F0 (KEY)</text>
  <text x="122" y="70" text-anchor="middle" fill="white" font-size="8">show=true</text>

  <rect x="175" y="42" width="85" height="35" rx="4" fill="#2ecc71"/>
  <text x="217" y="58" text-anchor="middle" fill="white" font-size="9" font-weight="bold">F3 (REF)</text>
  <text x="217" y="70" text-anchor="middle" fill="white" font-size="8">show=false</text>

  <rect x="270" y="42" width="85" height="35" rx="4" fill="#3498db"/>
  <text x="312" y="58" text-anchor="middle" fill="white" font-size="9" font-weight="bold">F1 (B)</text>
  <text x="312" y="70" text-anchor="middle" fill="white" font-size="8">show=true</text>

  <rect x="365" y="42" width="85" height="35" rx="4" fill="#3498db"/>
  <text x="407" y="58" text-anchor="middle" fill="white" font-size="9" font-weight="bold">F2 (B)</text>
  <text x="407" y="70" text-anchor="middle" fill="white" font-size="8">show=true</text>

  <rect x="460" y="42" width="85" height="35" rx="4" fill="#9b59b6"/>
  <text x="502" y="58" text-anchor="middle" fill="white" font-size="9" font-weight="bold">SHOW F3</text>
  <text x="502" y="70" text-anchor="middle" fill="white" font-size="8">show_existing</text>

  <!-- Arrows between nodes -->
  <line x1="165" y1="60" x2="175" y2="60" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="260" y1="60" x2="270" y2="60" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="355" y1="60" x2="365" y2="60" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="450" y1="60" x2="460" y2="60" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- What AssembleBitstreamData does for each -->
  <text x="450" y="105" text-anchor="middle" fill="#555" font-size="12" font-weight="bold">What AssembleBitstreamData does at each node:</text>

  <!-- F0 KEY -->
  <rect x="50" y="115" width="140" height="55" rx="4" fill="#fff3e0" stroke="#e67e22"/>
  <text x="120" y="133" text-anchor="middle" fill="#e67e22" font-size="10" font-weight="bold">F0 (KEY, show=true)</text>
  <text x="120" y="148" text-anchor="middle" fill="#555" font-size="9">fence ' query ' IVF hdr</text>
  <text x="120" y="160" text-anchor="middle" fill="#555" font-size="9">' WRITE to file</text>

  <!-- F3 REF -->
  <rect x="210" y="115" width="140" height="55" rx="4" fill="#e8f5e9" stroke="#2ecc71"/>
  <text x="280" y="133" text-anchor="middle" fill="#2ecc71" font-size="10" font-weight="bold">F3 (REF, show=false)</text>
  <text x="280" y="148" text-anchor="middle" fill="#555" font-size="9">fence ' query</text>
  <text x="280" y="160" text-anchor="middle" fill="#e74c3c" font-size="9" font-weight="bold">' BUFFER in m_bitstream[1]</text>

  <!-- F1 B -->
  <rect x="370" y="115" width="140" height="55" rx="4" fill="#e3f2fd" stroke="#3498db"/>
  <text x="440" y="133" text-anchor="middle" fill="#3498db" font-size="10" font-weight="bold">F1 (B, show=true)</text>
  <text x="440" y="148" text-anchor="middle" fill="#555" font-size="9">fence ' query ' IVF hdr</text>
  <text x="440" y="160" text-anchor="middle" fill="#555" font-size="9">' FLUSH buffered + self</text>

  <!-- SHOW F3 -->
  <rect x="530" y="115" width="140" height="55" rx="4" fill="#f3e5f5" stroke="#9b59b6"/>
  <text x="600" y="133" text-anchor="middle" fill="#9b59b6" font-size="10" font-weight="bold">SHOW F3 (existing)</text>
  <text x="600" y="148" text-anchor="middle" fill="#555" font-size="9">NO fence, NO buffer</text>
  <text x="600" y="160" text-anchor="middle" fill="#555" font-size="9">' Write OBU header only</text>

  <!-- File output -->
  <text x="450" y="200" text-anchor="middle" fill="#555" font-size="12" font-weight="bold">IVF Output File:</text>

  <rect x="80"  y="210" width="90" height="35" rx="4" fill="#e67e22" opacity="0.7"/>
  <text x="125" y="232" text-anchor="middle" fill="white" font-size="9">IVF hdr + F0</text>

  <rect x="180" y="210" width="140" height="35" rx="4" fill="#3498db" opacity="0.7"/>
  <text x="250" y="225" text-anchor="middle" fill="white" font-size="9">IVF hdr (combined size)</text>
  <text x="250" y="237" text-anchor="middle" fill="white" font-size="8">+ F3(buffered) + F1(VCL)</text>

  <rect x="330" y="210" width="120" height="35" rx="4" fill="#3498db" opacity="0.7"/>
  <text x="390" y="225" text-anchor="middle" fill="white" font-size="9">IVF hdr + F2</text>

  <rect x="460" y="210" width="120" height="35" rx="4" fill="#9b59b6" opacity="0.7"/>
  <text x="520" y="225" text-anchor="middle" fill="white" font-size="9">IVF hdr</text>
  <text x="520" y="237" text-anchor="middle" fill="white" font-size="8">+ show_existing OBU</text>

  <!-- Shared mutable state callout -->
  <rect x="120" y="265" width="620" height="35" rx="4" fill="#fff9c4" stroke="#f9a825"/>
  <text x="430" y="280" text-anchor="middle" fill="#555" font-size="10">Shared mutable state:</text>
  <text x="430" y="293" text-anchor="middle" fill="#e74c3c" font-size="10" font-weight="bold">m_bitstream[]  &amp;  m_batchFramesIndxSetToAssemble    NOT thread-safe</text>
</svg>
