<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="12">
  <text x="450" y="20" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Iteration 2   Two-Phase: Parallel Fence Waits, Serialized Writes</text>

  <!-- Worker 0 -->
  <text x="10" y="62" fill="#555" font-size="11">Worker 0</text>

  <rect x="100" y="45" width="150" height="30" rx="3" fill="#2196f3" opacity="0.8"/>
  <text x="175" y="58" text-anchor="middle" fill="white" font-size="9">ReadbackBitstreamData(F0)</text>
  <text x="175" y="69" text-anchor="middle" fill="white" font-size="8">fence wait ~5ms (NO MUTEX)</text>

  <rect x="260" y="45" width="80" height="30" rx="3" fill="#4caf50" opacity="0.8"/>
  <text x="300" y="58" text-anchor="middle" fill="white" font-size="9">WriteBitstream</text>
  <text x="300" y="69" text-anchor="middle" fill="white" font-size="8">(F0) ~0.1ms</text>

  <rect x="370" y="45" width="150" height="30" rx="3" fill="#2196f3" opacity="0.8"/>
  <text x="445" y="58" text-anchor="middle" fill="white" font-size="9">ReadbackBitstreamData(F2)</text>
  <text x="445" y="69" text-anchor="middle" fill="white" font-size="8">fence wait (NO MUTEX)</text>

  <rect x="530" y="45" width="80" height="30" rx="3" fill="#4caf50" opacity="0.8"/>
  <text x="570" y="58" text-anchor="middle" fill="white" font-size="9">WriteBitstream</text>
  <text x="570" y="69" text-anchor="middle" fill="white" font-size="8">(F2)</text>

  <!-- Worker 1 -->
  <text x="10" y="122" fill="#555" font-size="11">Worker 1</text>

  <rect x="110" y="105" width="150" height="30" rx="3" fill="#2196f3" opacity="0.8"/>
  <text x="185" y="118" text-anchor="middle" fill="white" font-size="9">ReadbackBitstreamData(F1)</text>
  <text x="185" y="129" text-anchor="middle" fill="white" font-size="8">fence wait ~5ms (NO MUTEX)</text>

  <rect x="340" y="105" width="25" height="30" rx="3" fill="#ff9800" opacity="0.6"/>
  <text x="352" y="124" text-anchor="middle" fill="#555" font-size="7">wait</text>

  <rect x="370" y="105" width="80" height="30" rx="3" fill="#4caf50" opacity="0.8"/>
  <text x="410" y="118" text-anchor="middle" fill="white" font-size="9">WriteBitstream</text>
  <text x="410" y="129" text-anchor="middle" fill="white" font-size="8">(F1)</text>

  <rect x="460" y="105" width="150" height="30" rx="3" fill="#2196f3" opacity="0.8"/>
  <text x="535" y="118" text-anchor="middle" fill="white" font-size="9">ReadbackBitstreamData(F3)</text>
  <text x="535" y="129" text-anchor="middle" fill="white" font-size="8">fence wait (NO MUTEX)</text>

  <!-- Mutex indicator -->
  <rect x="258" y="40" width="84" height="102" rx="0" fill="none" stroke="#e74c3c" stroke-width="2" stroke-dasharray="6"/>
  <text x="300" y="153" text-anchor="middle" fill="#e74c3c" font-size="9" font-weight="bold">mutex</text>

  <rect x="368" y="40" width="84" height="102" rx="0" fill="none" stroke="#e74c3c" stroke-width="2" stroke-dasharray="6"/>
  <text x="410" y="153" text-anchor="middle" fill="#e74c3c" font-size="9" font-weight="bold">mutex</text>

  <rect x="528" y="40" width="84" height="102" rx="0" fill="none" stroke="#e74c3c" stroke-width="2" stroke-dasharray="6"/>
  <text x="570" y="153" text-anchor="middle" fill="#e74c3c" font-size="9" font-weight="bold">mutex</text>

  <!-- Parallel region highlight -->
  <rect x="98" y="38" width="155" height="105" rx="0" fill="#e3f2fd" opacity="0.3"/>
  <rect x="368" y="38" width="155" height="105" rx="0" fill="#e3f2fd" opacity="0.3"/>

  <!-- File output -->
  <text x="10" y="192" fill="#555" font-size="11">File</text>
  <rect x="270" y="178" width="40" height="20" rx="3" fill="#27ae60"/>
  <text x="290" y="192" text-anchor="middle" fill="white" font-size="8">F0</text>
  <rect x="380" y="178" width="40" height="20" rx="3" fill="#27ae60"/>
  <text x="400" y="192" text-anchor="middle" fill="white" font-size="8">F1</text>
  <rect x="540" y="178" width="40" height="20" rx="3" fill="#27ae60"/>
  <text x="560" y="192" text-anchor="middle" fill="white" font-size="8">F2</text>

  <!-- Annotations -->
  <rect x="100" y="215" width="14" height="14" rx="2" fill="#2196f3" opacity="0.8"/>
  <text x="120" y="227" fill="#555" font-size="10">Phase 1: ReadbackBitstreamData (parallel, no mutex)</text>
  <rect x="100" y="237" width="14" height="14" rx="2" fill="#4caf50" opacity="0.8"/>
  <text x="120" y="249" fill="#555" font-size="10">Phase 2: WriteBitstreamToFile (serialized, encode order)</text>
  <rect x="480" y="215" width="14" height="14" rx="2" fill="#ff9800" opacity="0.6"/>
  <text x="500" y="227" fill="#555" font-size="10">Sequence-order wait (F1 waits for F0 to finish writing)</text>
  <rect x="480" y="237" width="14" height="14" rx="2" fill="none" stroke="#e74c3c" stroke-width="2" stroke-dasharray="4"/>
  <text x="500" y="249" fill="#555" font-size="10">File mutex region (only Write phase)</text>
</svg>
