<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="12">
  <text x="450" y="20" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Component Diagram   Encode Thread ' Queue ' Workers ' File</text>

  <!-- Encode Thread -->
  <rect x="30" y="60" width="180" height="120" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="120" y="82" text-anchor="middle" fill="#1976d2" font-size="12" font-weight="bold">Encode Thread</text>
  <text x="120" y="100" text-anchor="middle" fill="#555" font-size="9">(single-threaded)</text>
  <text x="120" y="118" text-anchor="middle" fill="#555" font-size="9">1. StartOfVideoCoding</text>
  <text x="120" y="130" text-anchor="middle" fill="#555" font-size="9">2. ProcessDpb</text>
  <text x="120" y="142" text-anchor="middle" fill="#555" font-size="9">3. RecordVideoCodingCmd</text>
  <text x="120" y="154" text-anchor="middle" fill="#555" font-size="9">4. SubmitVideoCodingCmds</text>
  <text x="120" y="168" text-anchor="middle" fill="#1976d2" font-size="9" font-weight="bold">' QueueForAssembly</text>

  <!-- Arrow to queue -->
  <line x1="210" y1="120" x2="280" y2="120" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="245" y="112" text-anchor="middle" fill="#555" font-size="9">push</text>

  <!-- Assembly Queue -->
  <rect x="280" y="80" width="140" height="80" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="2"/>
  <text x="350" y="102" text-anchor="middle" fill="#e65100" font-size="12" font-weight="bold">Assembly Queue</text>
  <text x="350" y="117" text-anchor="middle" fill="#555" font-size="9">VkThreadSafeQueue</text>
  <text x="350" y="132" text-anchor="middle" fill="#555" font-size="9">bounded (capacity=8)</text>
  <text x="350" y="147" text-anchor="middle" fill="#555" font-size="9">backpressure on full</text>

  <!-- Arrows to workers -->
  <line x1="420" y1="100" x2="490" y2="75"  stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="420" y1="140" x2="490" y2="165" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="455" y="88"  text-anchor="middle" fill="#555" font-size="9">pop</text>
  <text x="455" y="155" text-anchor="middle" fill="#555" font-size="9">pop</text>

  <!-- Worker 0 -->
  <rect x="490" y="45" width="200" height="60" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="590" y="67" text-anchor="middle" fill="#2e7d32" font-size="11" font-weight="bold">Worker Thread 0</text>
  <text x="590" y="82" text-anchor="middle" fill="#555" font-size="9">Readback (parallel) ' Write (ordered)</text>
  <text x="590" y="97" text-anchor="middle" fill="#555" font-size="9">' ReleaseAssemblyItem</text>

  <!-- Worker 1 -->
  <rect x="490" y="135" width="200" height="60" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="590" y="157" text-anchor="middle" fill="#2e7d32" font-size="11" font-weight="bold">Worker Thread 1</text>
  <text x="590" y="172" text-anchor="middle" fill="#555" font-size="9">Readback (parallel) ' Write (ordered)</text>
  <text x="590" y="187" text-anchor="middle" fill="#555" font-size="9">' ReleaseAssemblyItem</text>

  <!-- Arrow to file -->
  <line x1="690" y1="75"  x2="745" y2="110" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="690" y1="165" x2="745" y2="130" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- File -->
  <rect x="745" y="95" width="120" height="50" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="2"/>
  <text x="805" y="117" text-anchor="middle" fill="#c62828" font-size="11" font-weight="bold">Output File</text>
  <text x="805" y="132" text-anchor="middle" fill="#555" font-size="9">mutex + seq order</text>

  <!-- Resource pools -->
  <line x1="590" y1="195" x2="590" y2="230" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="590" y1="42"  x2="590" y2="32"  stroke="#555" stroke-width="1.5"/>
  <line x1="590" y1="32"  x2="350" y2="32"  stroke="#555" stroke-width="1.5"/>
  <line x1="350" y1="32"  x2="350" y2="42"  stroke="#555" stroke-width="1" stroke-dasharray="4"/>
  <text x="470" y="28" text-anchor="middle" fill="#888" font-size="9">refcount release ' pool nodes recycled</text>

  <rect x="490" y="230" width="200" height="30" rx="6" fill="#f5f5f5" stroke="#9e9e9e"/>
  <text x="590" y="250" text-anchor="middle" fill="#555" font-size="9">Resource Pools (bitstream, DPB, cmd buffers)</text>
</svg>
