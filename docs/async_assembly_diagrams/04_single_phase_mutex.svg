<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 860 240" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="12">
  <text x="430" y="20" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Iteration 1   Single-Phase: Mutex Defeats Parallelism</text>

  <!-- Worker 0 -->
  <text x="10" y="67" fill="#555" font-size="11">Worker 0</text>

  <rect x="100" y="50" width="30"  height="30" rx="3" fill="#bdc3c7"/>
  <text x="115" y="69" text-anchor="middle" fill="#555" font-size="8">pop</text>

  <rect x="135" y="50" width="250" height="30" rx="3" fill="#e74c3c" opacity="0.9"/>
  <text x="260" y="63" text-anchor="middle" fill="white" font-size="9">MUTEX HELD: fence wait + query + fwrite (F0)</text>
  <text x="260" y="74" text-anchor="middle" fill="white" font-size="8">~5ms fence + ~0.1ms write</text>

  <rect x="390" y="50" width="30"  height="30" rx="3" fill="#bdc3c7"/>
  <text x="405" y="69" text-anchor="middle" fill="#555" font-size="8">pop</text>

  <rect x="425" y="50" width="250" height="30" rx="3" fill="#e74c3c" opacity="0.9"/>
  <text x="550" y="63" text-anchor="middle" fill="white" font-size="9">MUTEX HELD: fence wait + query + fwrite (F2)</text>

  <!-- Worker 1 -->
  <text x="10" y="127" fill="#555" font-size="11">Worker 1</text>

  <rect x="100" y="110" width="30"  height="30" rx="3" fill="#bdc3c7"/>
  <text x="115" y="129" text-anchor="middle" fill="#555" font-size="8">pop</text>

  <rect x="135" y="110" width="250" height="30" rx="3" fill="#f39c12" opacity="0.6"/>
  <text x="260" y="129" text-anchor="middle" fill="#555" font-size="9">BLOCKED on mutex (waiting for W0)</text>

  <rect x="390" y="110" width="250" height="30" rx="3" fill="#e74c3c" opacity="0.9"/>
  <text x="515" y="123" text-anchor="middle" fill="white" font-size="9">MUTEX HELD: fence wait + query + fwrite (F1)</text>
  <text x="515" y="134" text-anchor="middle" fill="white" font-size="8">~5ms fence + ~0.1ms write</text>

  <!-- File -->
  <text x="10" y="177" fill="#555" font-size="11">File I/O</text>
  <rect x="340" y="163" width="40" height="20" rx="3" fill="#27ae60"/>
  <text x="360" y="177" text-anchor="middle" fill="white" font-size="8">F0</text>
  <rect x="600" y="163" width="40" height="20" rx="3" fill="#27ae60"/>
  <text x="620" y="177" text-anchor="middle" fill="white" font-size="8">F1</text>
  <rect x="630" y="163" width="40" height="20" rx="3" fill="#27ae60"/>
  <text x="650" y="177" text-anchor="middle" fill="white" font-size="8">F2</text>

  <!-- Problem callout -->
  <rect x="120" y="200" width="600" height="28" rx="4" fill="#ffebee" stroke="#e74c3c"/>
  <text x="420" y="219" text-anchor="middle" fill="#c62828" font-size="11" font-weight="bold">Problem: 2 threads but only 1 active   fence wait dominates and is serialized</text>
</svg>
